<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="45%" style="stop-color:#0d1526"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="goldgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="orb1" cx="25%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="75%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)"/>
  <ellipse cx="300" cy="160" rx="400" ry="250" fill="url(#orb1)"/>
  <ellipse cx="900" cy="160" rx="400" ry="250" fill="url(#orb2)"/>

  <!-- Subtle grid -->
  <g opacity="0.035" stroke="#6366f1" stroke-width="0.5">
    <line x1="0" y1="64" x2="1200" y2="64"/><line x1="0" y1="128" x2="1200" y2="128"/>
    <line x1="0" y1="192" x2="1200" y2="192"/><line x1="0" y1="256" x2="1200" y2="256"/>
    <line x1="150" y1="0" x2="150" y2="320"/><line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="450" y1="0" x2="450" y2="320"/><line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="750" y1="0" x2="750" y2="320"/><line x1="900" y1="0" x2="900" y2="320"/>
    <line x1="1050" y1="0" x2="1050" y2="320"/>
  </g>

  <!-- Animated sentiment wave -->
  <g opacity="0.15" filter="url(#glow)">
    <path d="M0,200 C100,170 200,230 300,180 C400,130 500,250 600,170 C700,90 800,210 900,155 C1000,100 1100,190 1200,140"
          fill="none" stroke="url(#accent1)" stroke-width="2"/>
    <path d="M0,220 C120,195 220,240 350,195 C480,150 560,265 660,190 C760,115 860,225 960,175 C1060,125 1130,205 1200,165"
          fill="none" stroke="url(#accent2)" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Brain/AI Icon -->
  <g transform="translate(62, 95)" filter="url(#softglow)">
    <circle cx="65" cy="65" r="62" fill="none" stroke="url(#accent1)" stroke-width="2" opacity="0.8"/>
    <circle cx="65" cy="65" r="50" fill="#0d1526" opacity="0.9"/>
    <!-- Neural network nodes -->
    <circle cx="35" cy="45" r="6" fill="#6366f1" opacity="0.9"/>
    <circle cx="65" cy="30" r="6" fill="#8b5cf6" opacity="0.9"/>
    <circle cx="95" cy="45" r="6" fill="#ec4899" opacity="0.9"/>
    <circle cx="28" cy="75" r="5" fill="#06b6d4" opacity="0.8"/>
    <circle cx="65" cy="65" r="8" fill="url(#accent1)" opacity="1"/>
    <circle cx="102" cy="75" r="5" fill="#f59e0b" opacity="0.8"/>
    <circle cx="40" cy="95" r="6" fill="#10b981" opacity="0.9"/>
    <circle cx="65" cy="105" r="6" fill="#6366f1" opacity="0.9"/>
    <circle cx="90" cy="95" r="6" fill="#8b5cf6" opacity="0.9"/>
    <!-- Connections -->
    <g stroke="#6366f1" stroke-width="1" opacity="0.5">
      <line x1="35" y1="45" x2="65" y2="30"/><line x1="65" y1="30" x2="95" y2="45"/>
      <line x1="35" y1="45" x2="65" y2="65"/><line x1="95" y1="45" x2="65" y2="65"/>
      <line x1="28" y1="75" x2="65" y2="65"/><line x1="102" y1="75" x2="65" y2="65"/>
      <line x1="40" y1="95" x2="65" y2="65"/><line x1="90" y1="95" x2="65" y2="65"/>
      <line x1="65" y1="105" x2="65" y2="65"/>
      <line x1="35" y1="45" x2="28" y2="75"/><line x1="95" y1="45" x2="102" y2="75"/>
      <line x1="28" y1="75" x2="40" y2="95"/><line x1="102" y1="75" x2="90" y2="95"/>
      <line x1="40" y1="95" x2="65" y2="105"/><line x1="90" y1="95" x2="65" y2="105"/>
    </g>
    <!-- Sentiment emoji ring -->
    <text x="14" y="70" font-size="14" opacity="0.8">😊</text>
    <text x="100" y="70" font-size="14" opacity="0.8">😤</text>
    <text x="57" y="14" font-size="13" opacity="0.8">🎯</text>
    <text x="57" y="130" font-size="13" opacity="0.8">📊</text>
  </g>

  <!-- Main Title -->
  <text x="210" y="112" font-family="'Segoe UI',Arial,sans-serif" font-size="13"
        fill="#6366f1" font-weight="700" letter-spacing="4" opacity="0.9">ENTERPRISE AI PLATFORM</text>

  <text x="210" y="162" font-family="'Segoe UI',Arial,sans-serif" font-size="40"
        font-weight="900" fill="#f1f5f9" letter-spacing="-1.5">Customer Sentiment</text>
  <text x="210" y="210" font-family="'Segoe UI',Arial,sans-serif" font-size="40"
        font-weight="900" fill="url(#accent1)" filter="url(#glow)" letter-spacing="-1.5">Analysis Engine</text>

  <rect x="210" y="222" width="700" height="3" fill="url(#accent1)" rx="2" filter="url(#glow)" opacity="0.9"/>

  <text x="210" y="254" font-family="'Segoe UI',Arial,sans-serif" font-size="14"
        fill="#64748b" letter-spacing="0.3">
    Multi-Model NLP · BERT/RoBERTa · BERTopic · RAG · Agentic AI · Business Intelligence
  </text>

  <!-- Feature pills -->
  <g transform="translate(210, 272)">
    <rect x="0" y="0" width="88" height="22" rx="11" fill="#1e1b4b" stroke="#6366f1" stroke-width="0.8"/>
    <text x="44" y="15" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#a5b4fc">🧠 7 ML Models</text>

    <rect x="98" y="0" width="96" height="22" rx="11" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="0.8"/>
    <text x="146" y="15" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#c4b5fd">💬 8 Emotions</text>

    <rect x="204" y="0" width="100" height="22" rx="11" fill="#1e1b4b" stroke="#ec4899" stroke-width="0.8"/>
    <text x="254" y="15" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#f9a8d4">📈 Churn Predict</text>

    <rect x="314" y="0" width="88" height="22" rx="11" fill="#1e1b4b" stroke="#06b6d4" stroke-width="0.8"/>
    <text x="358" y="15" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#67e8f9">🔍 RAG System</text>

    <rect x="412" y="0" width="100" height="22" rx="11" fill="#1e1b4b" stroke="#10b981" stroke-width="0.8"/>
    <text x="462" y="15" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#6ee7b7">🤖 AI Agents</text>

    <rect x="522" y="0" width="100" height="22" rx="11" fill="#1e1b4b" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="572" y="15" text-anchor="middle" font-family="Arial" font-size="9.5" fill="#fcd34d">📊 BI Dashboard</text>
  </g>

  <!-- Right side stats -->
  <g transform="translate(1000, 90)">
    <text x="0" y="0" font-family="monospace" font-size="10" fill="#475569">PERFORMANCE</text>
    <line x1="0" y1="8" x2="160" y2="8" stroke="#1e3a5f" stroke-width="0.5"/>

    <text x="0" y="28" font-family="monospace" font-size="10" fill="#64748b">Sentiment Acc</text>
    <text x="115" y="28" font-family="monospace" font-size="10" fill="#6366f1" font-weight="bold">96.4%</text>

    <text x="0" y="46" font-family="monospace" font-size="10" fill="#64748b">Emotion F1</text>
    <text x="115" y="46" font-family="monospace" font-size="10" fill="#8b5cf6" font-weight="bold">0.918</text>

    <text x="0" y="64" font-family="monospace" font-size="10" fill="#64748b">Churn AUC</text>
    <text x="115" y="64" font-family="monospace" font-size="10" fill="#ec4899" font-weight="bold">0.943</text>

    <text x="0" y="82" font-family="monospace" font-size="10" fill="#64748b">Reviews/sec</text>
    <text x="115" y="82" font-family="monospace" font-size="10" fill="#10b981" font-weight="bold">2,400</text>

    <text x="0" y="100" font-family="monospace" font-size="10" fill="#64748b">API Latency</text>
    <text x="115" y="100" font-family="monospace" font-size="10" fill="#f59e0b" font-weight="bold">~45ms</text>

    <text x="0" y="118" font-family="monospace" font-size="10" fill="#64748b">Topics Found</text>
    <text x="115" y="118" font-family="monospace" font-size="10" fill="#06b6d4" font-weight="bold">BERTopic</text>
  </g>

  <!-- Sentiment indicators -->
  <g transform="translate(1010, 230)" opacity="0.8">
    <circle cx="10" cy="10" r="8" fill="#10b981" filter="url(#glow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="24" y="14" font-family="monospace" font-size="10" fill="#64748b">POSITIVE</text>

    <circle cx="10" cy="34" r="8" fill="#f43f5e">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="24" y="38" font-family="monospace" font-size="10" fill="#64748b">NEGATIVE</text>

    <circle cx="10" cy="58" r="8" fill="#f59e0b">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="24" y="62" font-family="monospace" font-size="10" fill="#64748b">NEUTRAL</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="313" width="1200" height="4" fill="url(#accent1)" opacity="0.8"/>

  <!-- Version badge -->
  <rect x="1098" y="8" width="90" height="22" rx="11" fill="#1e1b4b" stroke="#475569" stroke-width="0.8"/>
  <text x="1143" y="22" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">v2.0 · MIT</text>
</svg>
